name: Create development builds

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Install and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Determine platform
        id: platform
        run: |
          # Check if this is a workflow_dispatch event with platform input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "selected_platform=${{ github.event.inputs.platform }}" >> $GITHUB_OUTPUT
          else
            echo "selected_platform=all" >> $GITHUB_OUTPUT
          fi

      - name: Build on EAS
        run: |
          if [ "${{ steps.platform.outputs.selected_platform }}" = "all" ]; then
            eas build --profile development --non-interactive
          else
            eas build --profile development --platform "${{ steps.platform.outputs.selected_platform }}" --non-interactive
          fi
