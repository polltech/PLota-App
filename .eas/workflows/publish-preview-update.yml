name: Publish preview update

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (android, ios, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
      - develop

jobs:
  publish:
    name: Publish preview update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish to Expo
        run: eas update --branch ${{ github.ref_name }} --message "${{ github.event.head_commit.message || 'Manual update via workflow dispatch' }}"

      - name: Build for target platform
        if: github.event.inputs && github.event.inputs.platform != ''
        run: |
          if [ "${{ (github.event.inputs && github.event.inputs.platform) || 'all' }}" = "all" ]; then
            eas build --profile preview --non-interactive
          else
            eas build --profile preview --platform "${{ github.event.inputs.platform }}" --non-interactive
          fi
