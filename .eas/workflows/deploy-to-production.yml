name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (android or ios)'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
  push:
    tags:
      - 'v*'
      - 'release-*'

jobs:
  build-manual:
    name: Manual production build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm ci
      - name: Build on EAS
        run: eas build --profile production --platform ${{ github.event.inputs.platform }} --non-interactive
      - name: Submit to stores
        run: |
          eas submit --platform ${{ github.event.inputs.platform }} --latest --non-interactive || true

  build-auto:
    name: Automatic production build on tag
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm ci
      - name: Build on EAS (Android)
        run: eas build --profile production --platform android --non-interactive
      - name: Build on EAS (iOS)
        run: eas build --profile production --platform ios --non-interactive
      - name: Submit to stores
        if: github.event_name == 'push'
        run: |
          eas submit --platform android --latest --non-interactive || true
          eas submit --platform ios --latest --non-interactive || true
