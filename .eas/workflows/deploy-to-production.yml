name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios
  push:
    tags:
      - 'v*'
      - 'release-*'

jobs:
  build:
    name: Build and deploy to production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Determine platform
        id: platform
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "selected_platform=${{ github.event.inputs.platform }}" >> $GITHUB_OUTPUT
          else
            echo "selected_platform=all" >> $GITHUB_OUTPUT
          fi

      - name: Build on EAS
        run: |
          if [ "${{ steps.platform.outputs.selected_platform }}" = "all" ]; then
            eas build --profile production --non-interactive
          else
            eas build --profile production --platform "${{ steps.platform.outputs.selected_platform }}" --non-interactive
          fi

      - name: Submit to stores
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        run: |
          if [ "${{ steps.platform.outputs.selected_platform }}" = "all" ] || [ "${{ steps.platform.outputs.selected_platform }}" = "android" ]; then
            eas submit --platform android --latest --non-interactive || true
          fi
          if [ "${{ steps.platform.outputs.selected_platform }}" = "all" ] || [ "${{ steps.platform.outputs.selected_platform }}" = "ios" ]; then
            eas submit --platform ios --latest --non-interactive || true
          fi
