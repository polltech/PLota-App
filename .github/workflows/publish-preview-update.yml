name: Publish preview update

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build after update (android or ios)'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish OTA update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm ci
      - name: Publish to Expo
        run: eas update --branch ${{ github.ref_name }} --message "${{ github.event.head_commit.message || 'Manual update via workflow dispatch' }}"

  build-manual:
    name: Build after OTA (manual only)
    needs: publish
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm ci
      - name: Build on EAS
        run: eas build --profile preview --platform ${{ github.event.inputs.platform }} --non-interactive
